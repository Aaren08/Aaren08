name: Metrics

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub Metrics
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.svg

          token: ${{ secrets.METRICS_TOKEN }}

          user: Aaren08
          template: classic
          base: header, activity, community, repositories, metadata

          config_timezone: Asia/Karachi

          # Display
          config_display: large
          config_padding: 10
          config_octicon: yes
          config_twemoji: yes
          config_animations: yes

          # Languages
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_details: percentage, bytes-size
          plugin_languages_analysis_timeout: 15
          plugin_languages_recent_categories: repositories
          plugin_languages_recent_days: 30

          # Isometric calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          # Stars
          plugin_stars: yes

          # Follow-up
          plugin_followup: yes
          plugin_followup_sections: repositories, user

          # Achievements
          plugin_achievements: no
          plugin_achievements_threshold: C
          plugin_achievements_display: compact
          plugin_achievements_secrets: yes

          # Activity
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: all

          # Repositories
          plugin_repositories: yes
          plugin_repositories_featured: Aaren08/bookwise-JSM
          plugin_repositories_order: featured, pinned, starred, random

          # Habits
          plugin_habits: yes
          plugin_habits_days: 14
          plugin_habits_from: 200
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          # Lines
          plugin_lines: yes

          # Topics
          plugin_topics: yes
          plugin_topics_limit: 20
          plugin_topics_mode: icons

          # Introduction
          plugin_introduction: yes
          plugin_introduction_title: yes

          # Output
          committer_branch: main
          committer_message: "chore: update metrics [skip ci]"
